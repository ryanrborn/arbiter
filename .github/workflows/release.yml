name: Build and Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (e.g. v0.1.0)"
        required: true

jobs:
  build:
    name: Build OTP Release
    runs-on: ubuntu-latest
    container:
      image: redhat/ubi8

    permissions:
      contents: write

    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      ELIXIR_ERL_OPTIONS: "+fnu"
      MIX_ENV: prod

    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            git \
            curl \
            make \
            gcc \
            gcc-c++ \
            openssl-devel \
            ncurses-devel \
            unzip \
            tar \
            gzip \
            which \
            glibc-langpack-en

      - uses: actions/checkout@v4

      - name: Install Erlang/OTP 28
        run: |
          OTP_RPM_VERSION="28.5.0.2-1"
          curl -fsSL "https://github.com/rabbitmq/erlang-rpm/releases/download/v28.5.0.2/erlang-${OTP_RPM_VERSION}.el8.x86_64.rpm" -o /tmp/erlang.rpm
          dnf install -y /tmp/erlang.rpm

      - name: Install Elixir 1.19
        run: |
          ELIXIR_VERSION="1.19.0"
          OTP_MAJOR="28"
          curl -fsSL "https://repo.hex.pm/builds/elixir/v${ELIXIR_VERSION}-otp-${OTP_MAJOR}.zip" -o /tmp/elixir.zip
          mkdir -p /opt/elixir
          unzip -q /tmp/elixir.zip -d /opt/elixir
          echo "/opt/elixir/bin" >> "$GITHUB_PATH"

      - name: Verify UTF-8 locale
        run: |
          locale
          python3 -c "import locale; print(locale.getlocale())" || true

      - name: Bootstrap Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Determine tag name
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Get production dependencies
        run: |
          MIX_ENV=prod mix deps.get --only prod

      - name: Install asset build tools
        run: |
          MIX_ENV=prod mix cmd --app arbiter_web mix assets.setup

      - name: Compile (prod)
        run: |
          MIX_ENV=prod mix compile

      - name: Build and digest web assets
        run: |
          MIX_ENV=prod mix cmd --app arbiter_web mix assets.deploy

      - name: Build OTP release
        run: |
          MIX_ENV=prod mix release arbiter
        env:
          MIX_ENV: prod

      - name: Build arb escript
        run: |
          cd apps/arbiter_cli && MIX_ENV=prod mix escript.build

      - name: Package and checksum release
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          TARBALL="arbiter-${TAG}-linux.tar.gz"
          tar -czf "${TARBALL}" -C _build/prod/rel/arbiter .
          sha256sum "${TARBALL}" > "${TARBALL}.sha256"
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "Arbiter ${{ steps.tag.outputs.name }}"
          files: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256
            apps/arbiter_cli/arb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
