name: arbiter-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: arbiter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arbiter
      POSTGRES_PASSWORD: arbiter_dev_password
      POSTGRES_DB: arbiter_dev
    ports:
      - "127.0.0.1:5433:5432"  # bind to localhost only; 5432 used by vstim
    volumes:
      - arbiter_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbiter -d arbiter_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  arbiter_pgdata:
    name: arbiter-pgdata
